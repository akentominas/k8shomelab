- name: Check if cluster already initialized
  stat:
    path: /etc/kubernetes/admin.conf
  register: k8s_init

- name: Initialize Kubernetes control plane
  command: >
    kubeadm init
    --pod-network-cidr=10.244.0.0/16
  when: not k8s_init.stat.exists
  register: kubeadm_init

- name: Show kubeadm init output
  debug:
    var: kubeadm_init.stdout_lines
  when: not k8s_init.stat.exists


# --- Setup kubectl for user ---

- name: Create .kube directory
  file:
    path: "/home/{{ ansible_user }}/.kube"
    state: directory
    mode: '0755'

- name: Copy admin.conf to user kube config
  copy:
    src: /etc/kubernetes/admin.conf
    dest: "/home/{{ ansible_user }}/.kube/config"
    remote_src: yes
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: '0644'


# --- Extract join command ---

- name: Generate join command
  command: kubeadm token create --print-join-command
  register: join_command

- name: Save join command locally
  copy:
    content: "{{ join_command.stdout }}"
    dest: "/tmp/kubeadm_join_cmd.sh"